name: WeChat Version Collector

on:
  schedule:
    - cron: '0 7 * * *'  # 每天 UTC 7:00 运行
  workflow_dispatch:
    inputs:
      platform:
        description: '选择平台 (all/mac/windows/android)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
          - android
      download_link:
        description: '手动指定下载链接（可选，仅支持单个平台测试）'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: write
  checks: write
  deployments: write
  issues: write
  packages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  save_new_wechat:
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: 1  # 避免每次都更新 Homebrew
    
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true  # 如果有新的运行，取消正在进行的运行
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false  # 安全性改进
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/destversion.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-
          enableCrossOsArchive: true  # 启用跨操作系统缓存
      
      - name: Setup environment
        run: |
          chmod +x scripts/*.sh
          brew update-reset  # 更可靠的更新方式
          
      - name: Install dependencies
        run: |
          brew install wget curl git gh p7zip jq
        
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      
      - name: Run Monitor
        run: |
          ./scripts/monitor.sh "${{ github.event.inputs.platform || 'all' }}" "${{ github.event.inputs.download_link }}"
        continue-on-error: false
        timeout-minutes: 45
      
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            temp_*/*.log
          retention-days: 7
          compression-level: 9 # 最大压缩级别
          overwrite: true

      - name: Cleanup
        if: always()
        run: |
          rm -rf temp_*
          rm -f *.log
          brew cleanup --prune=all  # 完全清理所有缓存
        continue-on-error: true  # 清理失败不应影响工作流状态
